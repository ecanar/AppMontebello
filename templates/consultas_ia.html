{% extends "base.html" %}

{% block title %}Consultas IA - App Montebello{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Consultas con IA</h2>
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h5>Pregúntale a la IA sobre tus compras</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('consultas_ia') }}">
                    <div class="mb-3">
                        <textarea class="form-control" name="pregunta" rows="3" placeholder="Ej: ¿Cuál es el producto más comprado? ¿Cuánto gasté esta semana?" required>{{ pregunta or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Consultar</button>
                </form>

                {% if respuesta %}
                <div class="mt-4 p-3 bg-light rounded border">
                    <h6 class="text-primary">Respuesta:</h6>
                    <p style="white-space: pre-wrap;">{{ respuesta }}</p>
                </div>
                {% endif %}

                {% if error %}
                <div class="mt-3 alert alert-danger">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
