{% extends "base.html" %}

{% block title %}Editar Proveedor - App Montebello{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Editar Proveedor</h2>
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Editar Información del Proveedor</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_proveedor', id=proveedor.Id_Prov) }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Proveedor</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" value="{{ proveedor.Nom_Prov }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cedula" class="form-label">Número de Cédula</label>
                        <input type="text" class="form-control" id="cedula" name="cedula" value="{{ proveedor.Num_Ced }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="anden" class="form-label">Número de Andén</label>
                        <input type="text" class="form-control" id="anden" name="anden" value="{{ proveedor.Num_Anden or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="puesto" class="form-label">Número de Puesto</label>
                        <input type="text" class="form-control" id="puesto" name="puesto" value="{{ proveedor.Num_Puesto or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="alias" class="form-label">Alias</label>
                        <input type="text" class="form-control" id="alias" name="alias" value="{{ proveedor.Alias or '' }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Actualizar Proveedor</button>
                    <a href="{{ url_for('proveedores') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
