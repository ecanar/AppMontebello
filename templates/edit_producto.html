{% extends "base.html" %}

{% block title %}Editar Producto - App Montebello{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Editar Producto</h2>
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Editar Información del Producto</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_producto', id=producto.id_Prod) }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Producto</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" value="{{ producto.Nom_Prod }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="medida" class="form-label">Medida</label>
                        <select class="form-select" id="medida" name="medida" required>
                            <option value="">Seleccionar medida...</option>
                            <option value="sac" {% if producto.Medida == 'sac' %}selected{% endif %}>Saco (sac)</option>
                            <option value="lbs" {% if producto.Medida == 'lbs' %}selected{% endif %}>Libras (lbs)</option>
                            <option value="ata" {% if producto.Medida == 'ata' %}selected{% endif %}>Atado (ata)</option>
                            <option value="rac" {% if producto.Medida == 'rac' %}selected{% endif %}>Racimo (rac)</option>
                            <option value="cart" {% if producto.Medida == 'cart' %}selected{% endif %}>Cartón (cart)</option>
                            <option value="uni" {% if producto.Medida == 'uni' %}selected{% endif %}>Unidad (uni)</option>
                            <option value="cub" {% if producto.Medida == 'cub' %}selected{% endif %}>Cubeta (cub)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="proveedor" class="form-label">Proveedor</label>
                        <select class="form-select" id="proveedor" name="proveedor" required>
                            <option value="">Seleccionar proveedor...</option>
                            {% for proveedor in proveedores %}
                            <option value="{{ proveedor.Id_Prov }}" {% if producto.Id_Prov == proveedor.Id_Prov %}selected{% endif %}>{{ proveedor.Nom_Prov }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Actualizar Producto</button>
                    <a href="{{ url_for('productos') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
